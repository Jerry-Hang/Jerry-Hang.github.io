---
layout: default
title: 首页
---

<h2>👋 欢迎来到我的小站</h2>
<p>这里是最新文章列表。</p>

<!-- 文章数据将作为 JSON 嵌入，供 JS 分页使用 -->
<script id="post-data" type="application/json">
[
  {% for post in site.posts %}
    {
      "title": {{ post.title | jsonify }},
      "url": {{ post.url | relative_url | jsonify }},
      "date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
      "excerpt": {{ post.excerpt | default: post.content | strip_html | truncate: 60 | jsonify }},
      "tags": [{% for tag in post.tags %}{{ tag | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}],
      "wordCount": {{ post.content | strip_html | replace: ' ', '' | replace: '\n', '' | size }},
      "readingTime": {{ post.content | number_of_words | divided_by: 400 | plus: 1 }},
      "pin": {{ post.pin | default: false | jsonify }}
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>

<div id="post-list-container">
  <div class="pinned-section" id="pinned-posts"></div>
  <ul class="post-list" id="post-list"></ul>
</div>
<div id="pagination" class="pagination"></div>

<script src="{{ '/assets/js/pagination.js' | relative_url }}"></script>
